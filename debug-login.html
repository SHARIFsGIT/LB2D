<!DOCTYPE html>
<html>
<head>
    <title>Debug Admin Login</title>
</head>
<body>
    <h1>Debug Admin Login</h1>
    
    <div id="result"></div>
    
    <script>
    async function testLogin() {
        try {
            const response = await fetch('http://localhost:5005/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: 'admin@gmail.com',
                    password: 'Admin@1234'
                })
            });
            
            const data = await response.json();
            console.log('Login response:', data);
            
            if (data.success) {
                // Store tokens
                sessionStorage.setItem('accessToken', data.data.accessToken);
                sessionStorage.setItem('refreshToken', data.data.refreshToken);
                sessionStorage.setItem('user', JSON.stringify(data.data.user));
                
                document.getElementById('result').innerHTML = `
                    <h2>Login Successful!</h2>
                    <p>User: ${data.data.user.firstName} ${data.data.user.lastName}</p>
                    <p>Role: ${data.data.user.role}</p>
                    <p>Tokens stored in sessionStorage</p>
                    <p><a href="http://localhost:3000/admin">Go to Admin Dashboard</a></p>
                `;
            } else {
                document.getElementById('result').innerHTML = `
                    <h2>Login Failed</h2>
                    <p>${data.message}</p>
                `;
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('result').innerHTML = `
                <h2>Error</h2>
                <p>${error.message}</p>
            `;
        }
    }
    
    // Auto-run the test
    testLogin();
    </script>
</body>
</html>
